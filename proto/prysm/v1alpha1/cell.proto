syntax = "proto3";

package ethereum.eth.v1alpha1;

import "proto/eth/ext/options.proto";

option csharp_namespace = "Ethereum.Eth.v1alpha1";
option go_package = "github.com/prysmaticlabs/prysm/v5/proto/prysm/v1alpha1;eth";
option java_multiple_files = true;
option java_outer_classname = "CellProto";
option java_package = "org.ethereum.eth.v1alpha1";
option php_namespace = "Ethereum\\Eth\\v1alpha1";

// CellSidecar represents a data availability cell sidecar.
message CellSidecar {
  // Transaction hash (can be omitted, but requires indexing transactions by their blob_versioned_hashes)
  bytes tx_hash = 1 [ (ethereum.eth.ext.ssz_size) = "32" ];   

  bytes cell = 2 [ (ethereum.eth.ext.ssz_size) = "bytes_per_cell.size" ];
  
  // Blob index
  uint32 blob_index = 3;            
  
  // Column index
  uint64 column_index = 4;
  
  // KZG commitment
  bytes kzg_commitment = 5 [ (ethereum.eth.ext.ssz_size) = "48" ];
  
  // KZG cell proof
  bytes kzg_cell_proof = 6 [ (ethereum.eth.ext.ssz_size) = "48" ];
}


