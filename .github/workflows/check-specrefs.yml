name: Check Spec References
on: [push, pull_request]

jobs:
  check-specrefs:
    runs-on: ubuntu-4

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Check version consistency
      run: |
        # The consensus-spec version is pinned in build/externaldata (the source of truth
        # since Bazel/WORKSPACE was removed). Keep it in sync with .ethspecify.yml.
        SRC_VERSION=$(grep -E 'consensusSpecVersion[[:space:]]*=' build/externaldata/externaldata.go | sed -E 's/.*"(.*)".*/\1/')
        ETHSPECIFY_VERSION=$(grep '^version:' .ethspecify.yml | sed 's/version: //')
        if [ "$SRC_VERSION" != "$ETHSPECIFY_VERSION" ]; then
          echo "Version mismatch between build/externaldata and ethspecify"
          echo "  build/externaldata/externaldata.go: $SRC_VERSION"
          echo "  .ethspecify.yml: $ETHSPECIFY_VERSION"
          exit 1
        else
          echo "Versions match: $SRC_VERSION"
        fi

    - name: Install ethspecify
      run: python3 -mpip install ethspecify

    - name: Update spec references
      run: ethspecify

    - name: Check for differences
      run: |
        if ! git diff --exit-code specrefs >/dev/null; then
          echo "Spec references are out-of-date!"
          echo ""
          git --no-pager diff specrefs
          exit 1
        else
          echo "Spec references are up-to-date!"
        fi

    - name: Check spec references
      run: ethspecify check
