name: Go

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ '*' ]
  merge_group:
    types: [checks_requested]

jobs:
  formatting:
    name: Formatting
    runs-on: ubuntu-4
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Go mod tidy checker
        id: gomodtidy
        uses: ./.github/actions/gomodtidy

  gosec:
    name: Gosec scan
    runs-on: ubuntu-4
    env:
      GO111MODULE: on
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Go 1.26.4
        uses: actions/setup-go@v4
        with:
          go-version: '1.26.4'
      - name: Run Gosec Security Scanner
        run: | # https://github.com/securego/gosec/issues/469
          export PATH=$PATH:$(go env GOPATH)/bin
          go install github.com/securego/gosec/v2/cmd/gosec@v2.22.1
          gosec -exclude-generated -exclude=G307,G115 -exclude-dir=crypto/bls/herumi ./...

  lint:
    name: Lint
    runs-on: ubuntu-4
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go 1.26.4
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'

      - name: Golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12

  vet:
    name: Vet
    runs-on: ubuntu-4
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go 1.26.4
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'

      # prysm-vet is the nogo replacement (custom analyzers + x/tools passes + staticcheck;
      # see tools/cmd/prysm-vet). It compiles the analyzed packages (incl. cgo/blst), so build
      # with the portable blst tag like the build job.
      - name: Run prysm-vet
        run: make lint
        env:
          CGO_CFLAGS: "-O2 -D__BLST_PORTABLE__"

  build:
    name: Build
    runs-on: ubuntu-4
    steps:
      - name: Set up Go 1.26.4
        uses: actions/setup-go@v4
        with:
          go-version: '1.26.4'
        id: go

      - name: Check out code into the Go module directory
        uses: actions/checkout@v4

      - name: Get dependencies
        run: |
          go get -v -t -d ./...

      - name: Build
        # -D__BLST_PORTABLE__ builds the portable (non-ADX) blst, matching what we ship.
        run: go build -v ./...
        env:
           CGO_CFLAGS: "-O2 -D__BLST_PORTABLE__"
        # fuzz leverage go tag based stubs at compile time.
        # Building and testing with these tags should be checked and enforced at pre-submit.
      - name: Test for fuzzing
        run: go test  -tags=fuzz,develop ./...  -test.run=^Fuzz
        env:
           CGO_CFLAGS: "-O2 -D__BLST_PORTABLE__"

# Unit tests run in Buildkite via the Go toolchain: `make test` (mainnet + minimal passes;
# `make test ... mode=race` for the race detector). They are intentionally not duplicated here.
