name: Check Generated Go Files

on:
  pull_request:
    paths:
      - 'proto/**/*.proto'
      - 'proto/**/*.pb.go'
      - 'proto/**/*.ssz.go'
      - 'proto/**/BUILD.bazel'
      - 'proto/ssz_proto_library.bzl'
      - 'build/gen/**'
      - 'Makefile'
      - 'go.mod'
      - '.github/workflows/check-generated-go.yml'
      - 'hack/check-bazel-drift.sh'

permissions:
  contents: read

jobs:
  check-generated-go:
    runs-on: ubuntu-4
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Regenerate generated Go files
        run: make gen

      - name: Check for generated file updates
        run: |
          if [ -n "$(git status --porcelain --untracked-files=all)" ]; then
            echo "Generated Go files are out-of-date. Run 'make gen' and commit the results."
            git status --short --untracked-files=all
            git --no-pager diff --name-only
            exit 1
          fi


      - name: Install Bazelisk and goimports
        run: |
          go install github.com/bazelbuild/bazelisk@v1.26.0
          go install golang.org/x/tools/cmd/goimports@v0.40.0
          mkdir -p "$HOME/bin"
          ln -sf "$(go env GOPATH)/bin/bazelisk" "$HOME/bin/bazel"
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Check generated files against Bazel output
        run: ./hack/check-bazel-drift.sh
