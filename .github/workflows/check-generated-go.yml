name: Check Generated Go Files

on:
  pull_request:
    paths:
      - 'proto/**/*.proto'
      - 'proto/**/*.pb.go'
      - 'proto/**/*.ssz.go'
      - 'hack/update-go-pbs.sh'
      - 'hack/update-go-ssz.sh'
      - 'hack/update-mockgen.sh'
      - 'hack/common.sh'
      - '.github/workflows/check-generated-go.yml'

permissions:
  contents: read

jobs:
  check-generated-go:
    runs-on: ubuntu-4
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go 1.25.1
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.1'

      # protoc is the only external tool the codegen needs; sszgen, mockgen and goimports
      # are run from the module (`go tool` / `go run`). Pin protoc to the version that
      # produced the committed *.pb.go (the "// protoc v3.21.7" stamp).
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '21.7'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Regenerate generated Go files (proto + ssz + mocks)
        run: make gen

      - name: Check for generated file updates
        run: |
          if [ -n "$(git status --porcelain --untracked-files=all)" ]; then
            echo "Generated Go files are out-of-date. Run 'make gen' and commit the results."
            echo ""
            git status --short --untracked-files=all
            echo ""
            git --no-pager diff --name-only
            exit 1
          fi
