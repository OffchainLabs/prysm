name: Check Generated Go Files

on:
  pull_request:
    paths:
      - 'proto/**/*.proto'
      - 'proto/**/*.pb.go'
      - 'proto/**/*.ssz.go'
      - 'build/gen/**'
      - 'Makefile'
      - 'go.mod'
      - '.github/workflows/check-generated-go.yml'

permissions:
  contents: read

jobs:
  check-generated-go:
    runs-on: ubuntu-4
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Install protoc
        env:
          PROTOC_VERSION: '21.7'
        run: |
          curl -sSL -o /tmp/protoc.zip \
            "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip"
          sudo unzip -o /tmp/protoc.zip -d /usr/local bin/protoc 'include/*'
          protoc --version

      - name: Regenerate generated Go files
        run: make gen

      - name: Check for generated file updates
        run: |
          if [ -n "$(git status --porcelain --untracked-files=all)" ]; then
            echo "Generated Go files are out-of-date. Run 'make gen' and commit the results."
            git status --short --untracked-files=all
            git --no-pager diff --name-only
            exit 1
          fi
