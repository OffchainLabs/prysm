# Check that proposed blocks include blob sidecars.

# Replaces those evaluators from legacy E2E:
# - BlobsIncludedInBlocks
#
# Requires the spamoor additional service (blob spammer) to be running so that
# blob transactions are produced.

id: blobs-included
name: "Blobs included in blocks check"
timeout: 60m

tasks:
  - name: check_clients_are_healthy
    title: "Wait for a healthy client"
    timeout: 5m
    config:
      minClientCount: 1

  - name: get_consensus_specs
    id: specs
    title: "Get consensus specs"

  - name: check_consensus_slot_range
    title: "Wait until a full post-Deneb epoch is available"
    timeout: 50m
    configVars:
      minEpochNumber: "| [1, ((.tasks.specs.outputs.specs.DENEB_FORK_EPOCH | tonumber) + 1)] | max"

  - name: check_consensus_block_proposals
    title: "Check at least one block includes blobs"
    timeout: 10m
    configVars:
      blockCount: "| .tasks.specs.outputs.specs.SLOTS_PER_EPOCH | tonumber"
    config:
      checkLookback: 32
      minBlobCount: 1
