# Check BLS-to-execution changes and full withdrawals for exited genesis validators.
#
# Replaces those evaluators from legacy E2E:
# - SubmitWithdrawal
# - ValidatorsHaveWithdrawn

id: withdrawals
name: "Exited validators are withdrawn"
timeout: 90m

config:
  # NOTE: This is a default Kurtosis wallet mnemonic as "preregistered_validator_keys_mnemonic".
  validatorMnemonic: "giant issue aisle success illegal bike spike question tent bar rely arctic volcano long crawl hungry vocal artwork sniff fantasy very lucky have athlete"
  walletPrivkey: ""
  withdrawalValidatorStartIndex: 2
  withdrawalValidatorCount: 2
  withdrawalWalletSeed: "prysm-kurtosis-withdrawals"

tasks:
  - name: check_clients_are_healthy
    title: "Check if at least one client is ready"
    timeout: 5m
    config:
      minClientCount: 1

  - name: get_consensus_specs
    id: specs
    title: "Get consensus specs"

  - name: get_pubkeys_from_mnemonic
    id: withdrawal_pubkeys
    title: "Derive withdrawal validator pubkeys"
    configVars:
      mnemonic: "validatorMnemonic"
      startIndex: "withdrawalValidatorStartIndex"
      count: "withdrawalValidatorCount"

  - name: generate_child_wallet
    id: withdrawal_wallet
    title: "Generate withdrawal target wallet"
    timeout: 5m
    configVars:
      privateKey: "walletPrivkey"
      walletSeed: "withdrawalWalletSeed"
  
  - name: check_consensus_slot_range
    title: "Wait until Capella fork is active"
    timeout: 50m
    configVars:
      minEpochNumber: "| (.tasks.specs.outputs.specs.CAPELLA_FORK_EPOCH | tonumber) + 1"

  - name: generate_bls_changes
    id: bls_changes
    title: "Generate BLS-to-execution changes"
    timeout: 10m
    configVars:
      mnemonic: "validatorMnemonic"
      startIndex: "withdrawalValidatorStartIndex"
      indexCount: "withdrawalValidatorCount"
      limitTotal: "withdrawalValidatorCount"
      targetAddress: "tasks.withdrawal_wallet.outputs.childWallet.address"

  - name: run_task_matrix
    title: "Wait for withdrawal credentials to update"
    timeout: 10m
    configVars:
      matrixValues: "tasks.withdrawal_pubkeys.outputs.pubkeys"
    config:
      runConcurrent: true
      matrixVar: "validatorPubkey"
      task:
        name: check_consensus_validator_status
        title: "Validator ${validatorPubkey} has execution withdrawal credentials"
        configVars:
          validatorPubKey: "validatorPubkey"
        config:
          withdrawalCredsPrefix: "0x01"

  - name: check_consensus_slot_range
    title: "Wait until withdrawal validators are exitable"
    timeout: 10m
    configVars:
      minEpochNumber: "| (.tasks.specs.outputs.specs.SHARD_COMMITTEE_PERIOD | tonumber) + 1"

  - name: generate_exits
    id: exit_batch
    title: "Generate voluntary exits"
    timeout: 10m
    configVars:
      mnemonic: "validatorMnemonic"
      startIndex: "withdrawalValidatorStartIndex"
      indexCount: "withdrawalValidatorCount"
      limitTotal: "withdrawalValidatorCount"
    config:
      exitEpoch: -1

  - name: run_tasks_concurrent
    title: "Wait for full withdrawals"
    timeout: 50m
    config:
      tasks:
        - name: run_task_matrix
          title: "Wait for validator balances to be withdrawn"
          configVars:
            matrixValues: "tasks.withdrawal_pubkeys.outputs.pubkeys"
          config:
            runConcurrent: true
            matrixVar: "validatorPubkey"
            task:
              name: check_consensus_validator_status
              title: "Validator ${validatorPubkey} withdrawn"
              configVars:
                validatorPubKey: "validatorPubkey"
              config:
                validatorStatus:
                  - withdrawal_done
                # Legacy ValidatorsHaveWithdrawn allowed <= 1 ETH.
                maxValidatorBalance: 1000000000
                withdrawalCredsPrefix: "0x01"

        - name: run_task_matrix
          title: "Wait for withdrawal payloads"
          configVars:
            matrixValues: "tasks.withdrawal_pubkeys.outputs.pubkeys"
          config:
            runConcurrent: true
            matrixVar: "validatorPubkey"
            task:
              name: check_consensus_block_proposals
              title: "Wait for withdrawal for ${validatorPubkey}"
              config:
                minWithdrawalCount: 1
              configVars:
                expectWithdrawals: "| [{publicKey: .validatorPubkey, address: .tasks.withdrawal_wallet.outputs.childWallet.address, minAmount: 31000000000}]"
