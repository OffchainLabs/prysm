# Check whether the Bellatrix fork transition produces post-fork beacon blocks.

# Replaces this evaluator from legacy E2E:
# - BellatrixForkTransition

id: fork-transition-bellatrix
name: "Bellatrix fork transition check"
timeout: 60m

tasks:
  - name: get_consensus_specs
    id: specs
    title: "Get consensus specs"

  - name: check_clients_are_healthy
    id: clients
    title: "Wait for healthy clients"
    timeout: 5m
    if: '| (.tasks.specs.outputs.specs.BELLATRIX_FORK_EPOCH | tonumber) as $epoch | ($epoch > 0 and $epoch < 18446744073709551615)'
    config:
      minClientCount: 1

  - name: check_consensus_slot_range
    title: "Wait for Bellatrix fork epoch"
    timeout: 50m
    if: '| (.tasks.specs.outputs.specs.BELLATRIX_FORK_EPOCH | tonumber) as $epoch | ($epoch > 0 and $epoch < 18446744073709551615)'
    configVars:
      minEpochNumber: "| (.tasks.specs.outputs.specs.BELLATRIX_FORK_EPOCH | tonumber)"

  - name: check_http_json
    title: "Check Bellatrix head block version"
    timeout: 10m
    if: '| (.tasks.specs.outputs.specs.BELLATRIX_FORK_EPOCH | tonumber) as $epoch | ($epoch > 0 and $epoch < 18446744073709551615)'
    configVars:
      url: '| .tasks.clients.outputs.goodClients[0].clRpcUrl + "/eth/v2/beacon/blocks/head"'
      assertions: |
        | (.tasks.specs.outputs.specs.BELLATRIX_FORK_EPOCH | tonumber) as $forkEpoch
        | (.tasks.specs.outputs.specs.SLOTS_PER_EPOCH | tonumber) as $slotsPerEpoch
        | [
            {
              "name": "block_version",
              "query": ".version",
              "operator": "eq",
              "value": "bellatrix"
            },
            {
              "name": "post_fork_slot",
              "query": ".data.message.slot | tonumber",
              "operator": "gte",
              "value": ($forkEpoch * $slotsPerEpoch)
            }
          ]
