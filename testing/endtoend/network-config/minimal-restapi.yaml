# Validator REST API e2e.

participants:
  # VC -> BN over REST API (JSON).
  - el_type: geth
    cl_type: prysm
    cl_image: "gcr.io/offchainlabs/prysm/beacon-chain:latest"
    cl_extra_params:
      - "--slots-per-archive-point=128" # slots_per_epoch * 16 = 128
      - "--blob-batch-limit=256"
      - "--blob-batch-limit-burst-factor=16"
      - "--block-batch-limit-burst-factor=8"
    vc_image: "gcr.io/offchainlabs/prysm/validator:latest"
    vc_extra_params:
      - "--graffiti-file=/config/graffiti.yaml"
      - "--enable-beacon-rest-api"
    vc_extra_mounts:
      "/config": "graffiti.yaml"
    count: 1

  # VC -> BN over REST API, forcing SSZ responses with PRYSM_API_OVERRIDE_ACCEPT=application/octet-stream.
  - el_type: geth
    cl_type: prysm
    cl_image: "gcr.io/offchainlabs/prysm/beacon-chain:latest"
    cl_extra_params:
      - "--slots-per-archive-point=128"
      - "--blob-batch-limit=256"
      - "--blob-batch-limit-burst-factor=16"
      - "--block-batch-limit-burst-factor=8"
    vc_image: "gcr.io/offchainlabs/prysm/validator:latest"
    vc_extra_params:
      - "--graffiti-file=/config/graffiti.yaml"
      - "--enable-beacon-rest-api"
    vc_extra_env_vars:
      PRYSM_API_OVERRIDE_ACCEPT: "application/octet-stream"
    vc_extra_mounts:
      "/config": "graffiti.yaml"
    count: 1

  # Late-joining beacon node for the P2P normal sync test.
  # Asserted by beacon-chain-sync.yaml.
  - el_type: geth
    cl_type: prysm
    cl_image: "gcr.io/offchainlabs/prysm/beacon-chain:latest"
    validator_count: 0
    skip_start: true
    count: 1

  # Late-joining beacon node for the checkpoint sync test: syncs from a finalized
  # checkpoint (served by the checkpointz additional service) instead of genesis.
  # Asserted by checkpoint-sync.yaml.
  - el_type: geth
    cl_type: prysm
    cl_image: "gcr.io/offchainlabs/prysm/beacon-chain:latest"
    validator_count: 0
    skip_start: true
    checkpoint_sync_enabled: true
    count: 1

extra_files:
  graffiti.yaml: |
    default: "Rice"
    random:
      - "Sushi"
      - "Ramen"
      - "Takoyaki"

network_params:
  preset: minimal

  # Following params are overrides for existing `e2e_config.yaml` values.
  # https://github.com/OffchainLabs/prysm/blob/bf4a3d6c349e69fec5aa0e707bf0eef84faa7707/config/params/testdata/e2e_config.yaml

  # Forking & BPO parameters - Starting from Bellatrix, upgrade until Electra.
  altair_fork_epoch: 0
  bellatrix_fork_epoch: 0
  capella_fork_epoch: 10
  deneb_fork_epoch: 12
  electra_fork_epoch: 14
  fulu_fork_epoch: 18446744073709551615
  gloas_fork_epoch: 18446744073709551615

  # Time parameters
  seconds_per_slot: 10
  slot_duration_ms: 10000
  # faster time for withdrawals
  min_validator_withdrawability_delay: 1
  # higher frequency of committee turnover and faster time to acceptable voluntary exit
  shard_committee_period: 4
  # process deposits more quickly, but insecure
  eth1_follow_distance: 8

  # Validator cycle parameters
  # scale queue churn at much lower validator counts for testing
  churn_limit_quotient: 65536

  # Deposit contract parameters
  network_id: "1337"
  deposit_contract_address: "0x4242424242424242424242424242424242424242"

  # Hack: Keep BPO forks unreachable.
  # Genesis generator still serializes far-future BPO blobSchedule
  # entries, and geth validates any present entry at startup.
  bpo_3_max_blobs: 32
  bpo_3_target_blobs: 21
  bpo_3_base_fee_update_fraction: 20609697
  bpo_4_max_blobs: 21
  bpo_4_target_blobs: 14
  bpo_4_base_fee_update_fraction: 13739630
  bpo_5_max_blobs: 21
  bpo_5_target_blobs: 14
  bpo_5_base_fee_update_fraction: 13739630

additional_services:
  - assertoor
  - dora
  - spamoor
  - checkpointz

spamoor_params:
  min_cpu: 10

assertoor_params:

ethereum_genesis_generator_params:
  extra_env:
    SECONDS_PER_ETH1_BLOCK: "2"
